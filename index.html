<!DOCTYPE html>
<html>
<head>
  <title>MeawMeaw 🐾</title>

  <!-- ฟอนต์น่ารัก -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(to right, #ffe4ec, #e0f7ff);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      color: #ff6f91;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    select, input, button {
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-family: 'Kanit', sans-serif;
    }

    button {
      background: #ff8fab;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff6f91;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f9f9f9;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🐾 MeawMeaw Diary 🐾</h1>
  <p>บันทึกชีวิตน้องแมวสุดน่ารัก 💖</p>

  <!-- เลือกสัตว์ -->
  <div class="card">
    <h3>🐱 เลือกสัตว์เลี้ยง</h3>
    <select onchange="changePet(this.value)">
      <option>🐱 แมว</option>
      <option>🐶 หมา</option>
      <option>🐰 กระต่าย</option>
    </select>
    <p id="pet">ตอนนี้: แมว 🐱</p>
  </div>

  <!-- ตาราง -->
  <div class="card">
    <h3>📅 ตารางกิจกรรม</h3>
    <input type="date" id="date">
    <input type="text" id="text" placeholder="เช่น พาไปหาหมอ / อาบน้ำ">
    <br>
    <button onclick="add()">➕ เพิ่ม</button>

    <ul id="list"></ul>
  </div>

  <script>
    function changePet(p){
      document.getElementById("pet").innerText = "ตอนนี้: " + p;
    }

    function add(){
      let d = document.getElementById("date").value;
      let t = document.getElementById("text").value;

      if(!d || !t){
        alert("ใส่ข้อมูลก่อนน้า 🥺");
        return;
      }

      let li = document.createElement("li");
      li.innerText = "📌 " + d + " - " + t;

      document.getElementById("list").appendChild(li);
    }
  </script>

</body>
</html>
