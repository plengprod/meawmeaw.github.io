<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw App 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  
  <style>
    :root { --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --text: #5D5632; --card: rgba(255, 255, 255, 0.6); }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --text: #3D5238; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --text: #3A4B6B; }

    body { font-family: 'Itim', cursive; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 120px; transition: 0.5s; }
    .container { width: 100%; max-width: 380px; margin: auto; }

    .app-page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
    .app-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* UI Elements */
    .glass-card { background: var(--card); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3); }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; margin-bottom: 15px; }
    .stat-box { background: white; border-radius: 25px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    
    /* Calendar Grid */
    .cal-container { background: white; border-radius: 35px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .cal-day { height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; position: relative; user-select: none; }
    .cal-day.today { background: var(--accent); color: white; font-weight: bold; }
    .has-event::after { content: ''; position: absolute; bottom: 5px; width: 4px; height: 4px; background: red; border-radius: 50%; }

    /* Modal / Pop-up */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
    .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 35px; padding: 25px; position: relative; }
    .event-item { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; text-align: left; }

    /* Inputs */
    input, select { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; font-family: 'Itim'; box-sizing: border-box; }
    
    .cat-display-area { width: 100%; height: 150px; background: white; border-radius: 35px; margin-top: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

    .bottom-nav { position: fixed; bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); width: 90%; max-width: 380px; height: 75px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; left: 50%; transform: translateX(-50%); z-index: 1000; }
    .nav-item { cursor: pointer; opacity: 0.3; font-size: 1.5rem; }
    .nav-item.active { opacity: 1; color: var(--accent); }
  </style>
</head>
<body>

<div id="eventModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalDateTitle">กิจกรรมวันนี้</h3>
    <div id="modalEventList"></div>
    <button onclick="document.getElementById('eventModal').style.display='none'" style="width:100%; padding:12px; background:#f0f0f0; border:none; border-radius:15px; font-family:'Itim';">ปิด</button>
  </div>
</div>

<div class="container">
  <div id="home" class="app-page active">
    <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
      <h1 style="margin:0;">ไงเจ้าทาส ! 🐾</h1>
      <button onclick="requestNotify()" style="font-size:0.7rem; background:white; border:none; border-radius:10px; padding:5px;">🔔 เปิดแจ้งเตือน</button>
    </div>

    <div class="stat-grid">
      <div class="stat-box"><div id="homeDay" style="font-size:1.5rem; font-weight:bold;">-</div><div id="homeMonth" style="font-size:0.6rem;">-</div></div>
      <div class="stat-box"><div id="taskRemain" style="font-size:1.2rem; font-weight:bold;">0</div><div style="font-size:0.6rem;">งานที่เหลือ</div></div>
      <div class="stat-box"><div style="font-size:1.2rem;">🧡</div><div id="homeProg" style="font-size:0.6rem;">0%</div></div>
    </div>

    <div id="urgentAlert" class="alert-banner" style="background:#FFEB3B; padding:15px; border-radius:20px; margin-bottom:15px; display:none;">
      <span>🟡 ถึงเวลาทำกิจกรรมแล้ว!</span>
    </div>

    <p style="font-weight:bold;">ตารางด่วน ⭐️</p>
    <div id="homeTaskGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>

    <div class="cat-display-area" onclick="document.getElementById('catInp').click()">
      <img id="catPrev" style="width:100%; height:100%; object-fit:cover; display:none;">
      <div id="catPlc" style="opacity:0.3;">📸 คลิกใส่รูปแมว</div>
      <input type="file" id="catInp" hidden onchange="loadImg(this)">
    </div>
  </div>

  <div id="calendar-page" class="app-page">
    <div class="cal-container">
      <h3 id="calMonthYear">-</h3>
      <div class="cal-grid" id="calGrid"></div>
      <p style="font-size:0.7rem; opacity:0.5; margin-top:10px;">* กดค้างที่วันที่เพื่อดูรายละเอียดกิจกรรม</p>
    </div>

    <div class="glass-card" style="margin-top:15px;">
      <h4>➕ เพิ่มกิจกรรม</h4>
      <input type="text" id="evTitle" placeholder="ทำอะไร?">
      <div style="display:flex; gap:5px;">
        <input type="time" id="evTime" style="flex:1;">
        <input type="text" id="evLoc" placeholder="ที่ไหน?" style="flex:1;">
      </div>
      <button onclick="addEvent()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:20px; color:white; font-weight:bold; font-family:'Itim';">บันทึก</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home', this)">🏠</div>
  <div class="nav-item" onclick="switchPage('calendar-page', this)">📅</div>
</nav>

<script>
  let events = JSON.parse(localStorage.getItem('catEvents')) || [];
  let longPressTimer;

  function switchPage(id, el) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    if(id === 'calendar-page') renderCalendar();
    updateHome();
  }

  function renderCalendar() {
    const now = new Date();
    const grid = document.getElementById('calGrid');
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    
    document.getElementById('calMonthYear').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' });
    grid.innerHTML = ['S','M','T','W','T','F','S'].map(d => `<div style="opacity:0.3;font-size:0.7rem;">${d}</div>`).join('');

    for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
    for(let d=1; d<=daysInMonth; d++) {
      const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
      const hasEv = events.some(e => e.date === dateStr);
      const isToday = d === now.getDate() ? 'today' : '';
      grid.innerHTML += `<div class="cal-day ${isToday} ${hasEv?'has-event':''}" 
        onmousedown="startPress('${dateStr}', ${d})" onmouseup="endPress()" 
        ontouchstart="startPress('${dateStr}', ${d})" ontouchend="endPress()">${d}</div>`;
    }
  }

  function startPress(date, day) {
    longPressTimer = setTimeout(() => showDayDetail(date, day), 600);
  }
  function endPress() { clearTimeout(longPressTimer); }

  function showDayDetail(date, day) {
    const dayEvents = events.filter(e => e.date === date);
    const list = document.getElementById('modalEventList');
    document.getElementById('modalDateTitle').innerText = `กิจกรรมวันที่ ${day}`;
    list.innerHTML = dayEvents.length ? '' : '<p>ไม่มีกิจกรรม</p>';
    
    dayEvents.forEach(e => {
      list.innerHTML += `
        <div class="event-item">
          <div style="font-weight:bold; color:var(--accent);">🕒 ${e.time} น.</div>
          <div><b>กิจกรรม:</b> ${e.title}</div>
          <div><b>สถานที่:</b> ${e.loc || '-'}</div>
        </div>`;
    });
    document.getElementById('eventModal').style.display = 'flex';
  }

  function addEvent() {
    const title = document.getElementById('evTitle').value;
    const time = document.getElementById('evTime').value;
    const loc = document.getElementById('evLoc').value;
    if(!title || !time) return alert("ใส่ข้อมูลให้ครบก่อนทาส!");

    const now = new Date();
    const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    
    events.push({ title, time, loc, date: dateStr, done: false });
    localStorage.setItem('catEvents', JSON.stringify(events));
    alert("บันทึกแล้ว! จะเตือนเมื่อถึงเวลานะ");
    renderCalendar();
    updateHome();
  }

  function updateHome() {
    const now = new Date();
    document.getElementById('homeDay').innerText = now.getDate();
    document.getElementById('homeMonth').innerText = now.toLocaleString('default', { month: 'short' }).toUpperCase();
    
    const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    const todayTasks = events.filter(e => e.date === todayStr);
    
    const grid = document.getElementById('homeTaskGrid');
    grid.innerHTML = "";
    todayTasks.forEach((t, i) => {
      grid.innerHTML += `
        <div style="background:white; padding:10px; border-radius:20px; text-align:center;">
          <div style="font-size:0.8rem;">${t.title}</div>
          <div style="font-size:0.6rem; opacity:0.5;">${t.time}</div>
        </div>`;
    });
    document.getElementById('taskRemain').innerText = todayTasks.filter(t => !t.done).length;
  }

  // ระบบแจ้งเตือนจริง
  function requestNotify() {
    Notification.requestPermission();
  }

  setInterval(() => {
    const now = new Date();
    const curTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    
    events.forEach(e => {
      if(e.date === todayStr && e.time === curTime && !e.notified) {
        if(Notification.permission === "granted") {
          new Notification(`🐾 ถึงเวลาแล้วเจ้าทาส!`, { body: `ต้องทำ: ${e.title} ที่ ${e.loc}` });
        }
        document.getElementById('urgentAlert').style.display = 'block';
        e.notified = true;
      }
    });
  }, 10000);

  function loadImg(inp) {
    if (inp.files && inp.files[0]) {
      let reader = new FileReader();
      reader.onload = e => {
        document.getElementById('catPrev').src = e.target.result;
        document.getElementById('catPrev').style.display = 'block';
        document.getElementById('catPlc').style.display = 'none';
      };
      reader.readAsDataURL(inp.files[0]);
    }
  }

  updateHome();
</script>
</body>
</html>
