<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw 🐾 8-Themes Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. CSS VARIABLES (8 PALETTES) --- */
    :root {
      /* Theme 1: Sunny Yellow (#FEF7C5) */
      --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --progress: #BCD3F9; --text: #5D5632;
    }

    [data-theme="berry"] { /* Theme 2: Berry Much (#FFB4DA) */
      --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --progress: #F5D1EF; --text: #633B4D;
    }

    [data-theme="sprout"] { /* Theme 3: Sprout Green (#D5FFC9) */
      --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --progress: #FFCBBF; --text: #3D5238;
    }

    [data-theme="cream"] { /* Theme 4: Vanilla Cream (#FFF8E9) */
      --bg: #FFF8E9; --hero: #FFFFFF; --accent: #F9D99A; --progress: #F5D1EF; --text: #6B5D44;
    }

    [data-theme="lavender"] { /* Theme 5: Lavender (#F5D1EF) */
      --bg: #F5D1EF; --hero: #FDF5FF; --accent: #D6A4D1; --progress: #D5FFC9; --text: #564053;
    }

    [data-theme="ocean"] { /* Theme 6: Soft Ocean (#BCD3F9) */
      --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --progress: #FEF7C5; --text: #3A4B6B;
    }

    [data-theme="peach"] { /* Theme 7: Pink Peach (#FFF4FD) */
      --bg: #FFF4FD; --hero: #FFFFFF; --accent: #FFB4DA; --progress: #D5FFC9; --text: #6B4E5E;
    }

    [data-theme="melon"] { /* Theme 8: Melon Orange (#FFCBBF) */
      --bg: #FFCBBF; --hero: #FFF5F2; --accent: #FF9B85; --progress: #FEF7C5; --text: #633E36;
    }

    /* --- 2. MAIN STYLES --- */
    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0; padding: 20px; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* แถบเลือกธีมแบบเลื่อนได้ */
    .theme-scroll {
      display: flex; gap: 12px; overflow-x: auto; width: 100%; max-width: 380px;
      padding: 10px 5px; margin-bottom: 20px;
    }
    .theme-dot {
      min-width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
      border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* การ์ดความสำเร็จแบบ Glass */
    .progress-card {
      background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px);
      width: 90%; max-width: 380px; padding: 20px; border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .progress-fill { background-color: var(--progress); width: 33%; height: 100%; border-radius: 20px; transition: 0.5s; }

    /* การ์ดแมวหลัก */
    .hero-cat-card {
      background-color: var(--hero);
      width: 90%; max-width: 380px; padding: 25px; border-radius: 35px;
      text-align: center; margin-bottom: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.05);
      transition: background-color 0.5s ease;
    }

    .task-area {
      width: 90%; max-width: 380px; border: 2px dashed rgba(0,0,0,0.1);
      border-radius: 25px; padding: 40px 20px; text-align: center; color: var(--text); opacity: 0.6;
    }

    .fab {
      position: fixed; bottom: 30px; background-color: var(--accent);
      width: 65px; height: 65px; border-radius: 50%; display: flex;
      justify-content: center; align-items: center; font-size: 28px; color: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer;
    }
  </style>
</head>

<body>

  <div style="width: 100%; max-width: 380px; margin-bottom: 5px;">
    <h2 style="margin:0">สวัสดีเจ้าทาส! 🐾</h2>
    <p style="margin:0; font-size: 0.85rem; opacity: 0.7;">เลือกธีมที่ชอบวันนี้:</p>
  </div>

  <div class="theme-scroll">
    <div class="theme-dot" style="background: #FEF7C5;" onclick="setTheme('')"></div>
    <div class="theme-dot" style="background: #FFB4DA;" onclick="setTheme('berry')"></div>
    <div class="theme-dot" style="background: #D5FFC9;" onclick="setTheme('sprout')"></div>
    <div class="theme-dot" style="background: #FFF8E9;" onclick="setTheme('cream')"></div>
    <div class="theme-dot" style="background: #F5D1EF;" onclick="setTheme('lavender')"></div>
    <div class="theme-dot" style="background: #BCD3F9;" onclick="setTheme('ocean')"></div>
    <div class="theme-dot" style="background: #FFF4FD;" onclick="setTheme('peach')"></div>
    <div class="theme-dot" style="background: #FFCBBF;" onclick="setTheme('melon')"></div>
  </div>

  <div class="progress-card">
    <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 500;">
      <span>🎯 ความสำเร็จวันนี้</span>
      <span>1 / 3 งาน</span>
    </div>
    <div style="background: rgba(0,0,0,0.05); height: 12px; border-radius: 10px; margin-top: 15px; overflow: hidden;">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="hero-cat-card">
    <div style="font-size: 3rem; margin-bottom: 10px;">🐱</div>
    <div style="font-weight: 500; font-size: 1.4rem;">น้องชานม ∨</div>
    <div style="font-size: 0.95rem; margin-top: 5px; opacity: 0.8;">สุขภาพ: แข็งแรงดี | การกิน: ปกติ 🍽️</div>
  </div>

  <div class="task-area">
    <span style="letter-spacing: 2px; font-weight: 300;">SKY IS CLEAR ✨</span>
  </div>

  <div class="fab">＋</div>

  <script>
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
    }
  </script>

</body>
</html>
