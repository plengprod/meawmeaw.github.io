<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw App 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. THEME & CORE CSS (ห้ามหาย!) --- */
    :root { --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --text: #5D5632; --card: rgba(255, 255, 255, 0.6); }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --text: #3D5238; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --text: #3A4B6B; }

    body { font-family: 'Itim', cursive; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 120px; transition: 0.5s; overflow-x: hidden; }
    .container { width: 100%; max-width: 380px; margin: auto; }

    .app-page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
    .app-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* UI Dashboard Elements */
    .glass-card { background: var(--card); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3); }
    .profile-card { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; margin-bottom: 15px; }
    .stat-box { background: white; border-radius: 25px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .alert-banner { background: #FFEB3B; color: #856404; padding: 15px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    
    .toggle-switch { width: 45px; height: 24px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
    .toggle-switch.on { background: #4CAF50; }
    .toggle-switch::before { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
    .toggle-switch.on::before { left: 24px; }

    /* ช่องใส่รูปแมวมุมมน */
    .cat-photo-frame { width: 100%; height: 180px; background: white; border-radius: 35px; margin-top: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); cursor: pointer; }

    /* Calendar Grid Full Month */
    .cal-container { background: white; border-radius: 35px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .cal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 20px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; font-size: 0.9rem; }
    .day-label { opacity: 0.3; font-size: 0.7rem; padding-bottom: 10px; }
    .cal-day { height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; position: relative; user-select: none; }
    .cal-day.today { background: var(--accent); color: white; font-weight: bold; }
    .has-event::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: #FF8FAB; border-radius: 50%; }

    /* Modal / Popup */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center; }
    .modal-content { background: white; width: 85%; max-width: 320px; border-radius: 35px; padding: 25px; text-align: center; }
    .event-item { border-left: 4px solid var(--accent); padding: 5px 10px; margin-bottom: 10px; text-align: left; background: #fefefe; border-radius: 0 10px 10px 0; }

    /* Tasks */
    .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .task-box { background: white; padding: 15px; border-radius: 25px; text-align: center; }
    .btn-check { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 12px; width: 100%; margin-top: 10px; font-family: 'Itim'; cursor: pointer; }

    /* Navigation */
    .bottom-nav { position: fixed; bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); width: 90%; max-width: 380px; height: 75px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 1000; }
    .nav-item { cursor: pointer; opacity: 0.3; transition: 0.3s; font-size: 1.5rem; }
    .nav-item.active { opacity: 1; color: var(--accent); }
    
    input, select { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; font-family: 'Itim'; box-sizing: border-box; }
  </style>
</head>
<body>

<div id="dayDetailModal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalDateTitle">กิจกรรม</h3>
    <div id="modalEventList" style="margin: 20px 0;"></div>
    <button onclick="document.getElementById('dayDetailModal').style.display='none'" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:20px; color:white; font-family:'Itim';">ตกลง</button>
  </div>
</div>

<div class="container">

  <div id="home" class="app-page active">
    <div class="glass-card profile-card">
      <div>
        <h1 style="margin:0; font-size:1.8rem;">ไงเจ้าทาส ! 🐾</h1>
        <p style="margin:0; opacity:0.6; font-size:0.8rem;">— C H E C K Q</p>
      </div>
      <div style="display:flex; gap:8px;">
        <div onclick="setTheme('')" style="width:22px; height:22px; background:#FEF7C5; border-radius:50%; border:2px solid white; cursor:pointer;"></div>
        <div onclick="setTheme('berry')" style="width:22px; height:22px; background:#FFB4DA; border-radius:50%; border:2px solid white; cursor:pointer;"></div>
        <div onclick="setTheme('sprout')" style="width:22px; height:22px; background:#D5FFC9; border-radius:50%; border:2px solid white; cursor:pointer;"></div>
        <div onclick="setTheme('ocean')" style="width:22px; height:22px; background:#BCD3F9; border-radius:50%; border:2px solid white; cursor:pointer;"></div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-box"><div id="hDate" style="font-size:1.5rem; font-weight:bold;">21</div><div id="hMonth" style="font-size:0.6rem; opacity:0.5;">APR 2026</div></div>
      <div class="stat-box" onclick="switchPage('check-page', document.getElementById('nav-check'))" style="cursor:pointer;">
        <div style="border: 2px solid var(--accent); width:35px; height:35px; border-radius:50%; margin:0 auto 5px; display:flex; align-items:center; justify-content:center; font-weight:bold;" id="remCount">0</div>
        <div style="font-size:0.6rem; opacity:0.5;">ตารางที่เหลือ</div>
      </div>
      <div class="stat-box"><div style="font-size:1.5rem;">🧡</div><div id="hProg" style="font-size:0.7rem; font-weight:bold;">0%</div></div>
    </div>

    <div class="alert-banner" id="bannerClean">
      <span>🟡 วันนี้ยังไม่ได้ล้างกระบะ</span>
      <span onclick="this.parentElement.remove()" style="cursor:pointer; opacity:0.5;">X ปิด</span>
    </div>

    <div style="font-size:0.9rem; margin-bottom:8px; opacity: 0.8;">管理 แจ้งเตือนด่วน ∨</div>
    <div class="glass-card" style="padding:15px; background:rgba(255,255,255,0.2);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span>⏰ อาหารเช้า 11:00</span>
        <div class="toggle-switch on" onclick="this.classList.toggle('on')"></div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>⏰ ล้างกระบะ 20:00</span>
        <div class="toggle-switch" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>

    <p style="font-weight:bold; margin-top:20px;">ตารางด่วนวันนี้ ⭐️</p>
    <div id="taskGridHome" class="task-grid"></div>
    <div id="taskFullHome" style="margin-top:12px;"></div>

    <div class="cat-photo-frame" onclick="document.getElementById('catInput').click()">
      <img id="catPreview" style="width:100%; height:100%; object-fit:cover; display:none;">
      <div id="catPlaceholder" style="text-align:center; opacity:0.4;">📸 คลิกใส่รูปแมว</div>
      <input type="file" id="catInput" hidden onchange="previewCat(this)">
    </div>
  </div>

  <div id="calendar" class="app-page">
    <div class="cal-container">
      <div class="cal-header"><span style="opacity:0.2;">◀</span><span id="calTitle">April 2026</span><span style="opacity:0.2;">▶</span></div>
      <div class="cal-grid" id="calGridMain"></div>
      <p style="font-size:0.6rem; margin-top:10px; opacity:0.4;">* กดค้างที่วันที่เพื่อดูรายละเอียดหัวข้อ</p>
    </div>

    <div class="glass-card" style="margin-top:20px;">
      <h4>➕ เพิ่มกิจกรรมใหม่</h4>
      <input type="text" id="evTitle" placeholder="ทำอะไร? (กิจกรรม)">
      <div style="display:flex; gap:8px;">
        <input type="time" id="evTime" style="flex:1;">
        <input type="text" id="evLoc" placeholder="ที่ไหน? (สถานที่)" style="flex:1;">
      </div>
      <button onclick="addEventReal()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:20px; color:white; font-weight:bold; font-family:'Itim';">บันทึกลงตาราง</button>
    </div>
  </div>

  <div id="check-page" class="app-page"><h2 style="text-align:center;">📋 รายการทั้งหมด</h2><div id="checkAllList"></div></div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home', this)">🏠</div>
  <div id="nav-check" class="nav-item" onclick="switchPage('check-page', this)">📋</div>
  <div class="nav-item" onclick="switchPage('calendar', this)">📅</div>
</nav>

<script>
  let events = JSON.parse(localStorage.getItem('catData')) || [
    { title: "อาหารเช้า", time: "11:00", loc: "ห้องครัว", date: "2026-03-21", done: false, showHome: true, type: "grid" }
  ];
  let longPressTimer;

  function switchPage(id, el) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    if(id === 'calendar') renderCalendarMain();
    renderHomeTasks();
  }

  function renderCalendarMain() {
    const now = new Date();
    const grid = document.getElementById('calGridMain');
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
    
    document.getElementById('calTitle').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' });
    grid.innerHTML = ['S','M','T','W','T','F','S'].map(d => `<div class="day-label">${d}</div>`).join('');

    for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
    for(let d=1; d<=daysInMonth; d++) {
      const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
      const hasEv = events.some(e => e.date === dateStr);
      const isToday = d === now.getDate() ? 'today' : '';
      grid.innerHTML += `<div class="cal-day ${isToday} ${hasEv?'has-event':''}" 
        onmousedown="startPress('${dateStr}', ${d})" onmouseup="endPress()" 
        ontouchstart="startPress('${dateStr}', ${d})" ontouchend="endPress()">${d}</div>`;
    }
  }

  function startPress(date, day) { longPressTimer = setTimeout(() => showDayInfo(date, day), 600); }
  function endPress() { clearTimeout(longPressTimer); }

  function showDayInfo(date, day) {
    const dayEvs = events.filter(e => e.date === date);
    const list = document.getElementById('modalEventList');
    document.getElementById('modalDateTitle').innerText = `กิจกรรมวันที่ ${day}`;
    list.innerHTML = dayEvs.length ? '' : '<p>ไม่มีกิจกรรมวันนี้</p>';
    dayEvs.forEach(e => {
      list.innerHTML += `<div class="event-item"><b>${e.time}</b>: ${e.title} <br><small>📍 ${e.loc || '-'}</small></div>`;
    });
    document.getElementById('dayDetailModal').style.display = 'flex';
  }

  function addEventReal() {
    const title = document.getElementById('evTitle').value;
    const time = document.getElementById('evTime').value;
    const loc = document.getElementById('evLoc').value;
    if(!title || !time) return alert("ใส่ชื่อกิจกรรมกับเวลาด้วยทาส!");

    const now = new Date();
    const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    
    events.push({ title, time, loc, date: dateStr, done: false, showHome: true, type: "grid" });
    localStorage.setItem('catData', JSON.stringify(events));
    renderCalendarMain();
    renderHomeTasks();
    alert("บันทึกแล้ว! จะเตือนเมื่อถึงเวลา (ต้องเปิดหน้าเว็บทิ้งไว้)");
  }

  function renderHomeTasks() {
    const grid = document.getElementById('taskGridHome');
    const full = document.getElementById('taskFullHome');
    const check = document.getElementById('checkAllList');
    grid.innerHTML = ""; full.innerHTML = ""; check.innerHTML = "";
    
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    
    let rem = 0; let done = 0;
    events.forEach((t, i) => {
      if(t.date === todayStr) {
        if(!t.done) rem++; else done++;
        const html = `<div class="${t.type==='grid'?'task-box':''}" style="${t.type==='full'?'background:white; padding:15px 25px; border-radius:25px; display:flex; justify-content:space-between; margin-bottom:10px;':''}">
          <div><div>${t.title}</div><div style="font-size:0.6rem; opacity:0.5;">${t.time}</div></div>
          <button class="btn-check" style="${t.type==='full'?'width:80px; margin:0':''}" onclick="toggleDone(${i})">${t.done?'DONE':'CHECK'}</button>
        </div>`;
        if(t.type === 'grid') grid.innerHTML += html; else full.innerHTML += html;
      }
      check.innerHTML += `<div class="glass-card" style="display:flex; justify-content:space-between;"><span>${t.date} | ${t.time} ${t.title}</span><button onclick="delEv(${i})">🗑️</button></div>`;
    });
    document.getElementById('remCount').innerText = rem;
    document.getElementById('hProg').innerText = (events.length > 0 ? Math.round((done/events.length)*100) : 0) + "%";
    document.getElementById('hDate').innerText = now.getDate();
  }

  function toggleDone(i) { events[i].done = !events[i].done; renderHomeTasks(); }
  function delEv(i) { events.splice(i,1); localStorage.setItem('catData', JSON.stringify(events)); renderHomeTasks(); }
  function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }
  function previewCat(inp) {
    if (inp.files && inp.files[0]) {
      let r = new FileReader();
      r.onload = e => { document.getElementById('catPreview').src = e.target.result; document.getElementById('catPreview').style.display='block'; document.getElementById('catPlaceholder').style.display='none'; };
      r.readAsDataURL(inp.files[0]);
    }
  }

  // ระบบตรวจสอบเวลาแจ้งเตือนจริง (ต้องเปิดหน้าเว็บทิ้งไว้)
  setInterval(() => {
    const now = new Date();
    const curTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
    events.forEach(e => {
      if(e.date === todayStr && e.time === curTime && !e.notified) {
        if(Notification.permission === "granted") new Notification(`🐾 ถึงเวลา: ${e.title}`, { body: `ที่ ${e.loc}` });
        else alert(`⏰ เตือน: ${e.title} (${e.time})`);
        e.notified = true;
      }
    });
  }, 10000);

  renderHomeTasks();
</script>
</body>
</html>
