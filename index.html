<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw 🐾 - Smart Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-mint: #f0f9f6;
      --card-white: rgba(255, 255, 255, 0.85);
      --accent-pink: #ffdae3;
      --text-main: #5a6b66;
      --shadow: 0 10px 30px rgba(150, 180, 170, 0.15);
    }

    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- Header Section --- */
    .header-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user-info h2 { margin: 0; font-size: 1.4rem; color: #4a5568; }
    .user-info p { margin: 0; font-size: 0.85rem; color: #a0aec0; }

    /* --- Main Progress Card (จากรูปที่มึงส่งมา) --- */
    .progress-card {
      background: var(--card-white);
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 380px;
      padding: 20px;
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }

    .progress-bar-container {
      background: #edf2f7;
      border-radius: 20px;
      height: 12px;
      margin: 15px 0;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(to right, #b2f5ea, #81e6d9);
      width: 33%; /* ตัวอย่างความสำเร็จ 1/3 */
      height: 100%;
      transition: width 0.5s ease;
    }

    /* --- Hero Cat Card (สีชมพูพาสเทล) --- */
    .hero-cat-card {
      background: linear-gradient(180deg, #fff5f7 0%, #ffe4ec 100%);
      width: 90%;
      max-width: 380px;
      padding: 25px;
      border-radius: 35px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 15px 35px rgba(255, 180, 193, 0.2);
    }

    .cat-avatar { width: 80px; height: 80px; border-radius: 50%; background: #fff; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

    /* --- Toggle Panel (Control Panel) --- */
    .control-panel {
      width: 90%;
      max-width: 380px;
      background: white;
      border-radius: 25px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px f9f9f9 solid;
    }

    /* --- Task Area (Dashed Line) --- */
    .task-area {
      width: 90%;
      max-width: 380px;
      border: 2px dashed #cbd5e0;
      border-radius: 25px;
      padding: 30px;
      text-align: center;
      color: #a0aec0;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    /* --- Floating FAB --- */
    .fab {
      position: fixed;
      bottom: 80px;
      background: linear-gradient(45deg, #ff8fab, #ffc1cc);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      box-shadow: 0 10px 25px rgba(255, 143, 171, 0.4);
      cursor: pointer;
    }

    /* --- Bottom Nav --- */
    .bottom-nav {
      position: fixed;
      bottom: 15px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      width: 250px;
      height: 60px;
      border-radius: 40px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: var(--shadow);
    }
  </style>
</head>

<body>

  <div class="header-container">
    <div class="user-info">
      <h2>สวัสดีเจ้าทาส! 🐾</h2>
      <p>อังคารที่ 21 เม.ย. 2026</p>
    </div>
    <div style="font-size: 24px;">🎨</div>
  </div>

  <div class="progress-card">
    <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
      <span>🎯 ความสำเร็จวันนี้</span>
      <span>33% (1/3 งาน)</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="hero-cat-card">
    <img src="https://placekitten.com/200/200" alt="cat" class="cat-avatar">
    <div style="font-weight: 500; font-size: 1.2rem;">น้องชานม ∨</div>
    <div style="color: #ff8fab; font-size: 0.9rem;">สุขภาพ: แข็งแรงดี | การกิน: ปกติ 🍽️</div>
    <div style="margin-top: 10px; background: white; border-radius: 15px; padding: 5px; font-size: 0.8rem;">
      Quick Insight: กินครบ 2 วันติด 👍 >
    </div>
  </div>

  <div class="control-panel">
    <div style="font-size: 0.8rem; color: #a0aec0; margin-bottom: 10px;">🔔 ตั้งค่าแจ้งเตือนด่วน</div>
    <div class="toggle-row">
      <span>🥣 อาหารเช้า 11:00</span>
      <span style="color: #48bb78; font-weight: bold;">ON</span>
    </div>
    <div class="toggle-row" style="border:none;">
      <span>💩 ล้างกระบะ 20:00</span>
      <span style="color: #cbd5e0;">OFF</span>
    </div>
  </div>

  <div class="task-area">
    SKY IS CLEAR 🐾
  </div>

  <div class="fab">＋</div>

  <nav class="bottom-nav">
    <span style="font-size: 20px;">🏠</span>
    <span style="font-size: 20px; color: #cbd5e0;">🩺</span>
    <span style="font-size: 20px; color: #cbd5e0;">⚙️</span>
  </nav>

</body>
</html>
