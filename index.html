<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw Ultimate 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. THEME ENGINE (สีที่มึงส่งมาเป๊ะๆ) --- */
    :root { --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --progress: #BCD3F9; --text: #5D5632; }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --progress: #F5D1EF; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --progress: #FFCBBF; --text: #3D5238; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --progress: #FEF7C5; --text: #3A4B6B; }
    [data-theme="lavender"] { --bg: #F5D1EF; --hero: #FDF5FF; --accent: #D6A4D1; --progress: #D5FFC9; --text: #564053; }

    body { font-family: 'Itim', cursive; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 120px; transition: 0.5s; }
    .container { width: 100%; max-width: 380px; margin: auto; }

    /* Page System */
    .app-page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
    .app-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- UI ELEMENTS หน้าแรก (Dashboard) --- */
    .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3); }
    .profile-card { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; margin-bottom: 15px; }
    .stat-box { background: white; border-radius: 25px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    
    /* Pet & Tasks */
    .hero-card { background-color: var(--hero); padding: 20px; border-radius: 35px; text-align: center; margin-bottom: 15px; }
    .task-item { background: white; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .btn-check { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 12px; font-family: 'Itim'; cursor: pointer; }
    .empty-state { border: 2px dashed rgba(0,0,0,0.1); border-radius: 20px; padding: 30px; text-align: center; opacity: 0.4; }

    /* --- CALENDAR STYLE --- */
    .cal-card { background: white; border-radius: 35px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
    .day { padding: 10px 0; border-radius: 50%; cursor: pointer; font-size: 0.9rem; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
    .day.active { background: var(--accent); color: white; font-weight: bold; }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); width: 90%; max-width: 380px; height: 70px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .nav-item { cursor: pointer; opacity: 0.3; transition: 0.3s; font-size: 1.4rem; }
    .nav-item.active { opacity: 1; transform: scale(1.2); }
  </style>
</head>

<body>

<div class="container">

  <div id="home" class="app-page active">
    <div class="glass-card profile-card">
      <div>
        <h1 style="margin:0; font-size:1.8rem; letter-spacing:1px;">TEST <small style="font-size:0.8rem; opacity:0.5; font-weight:normal; border:1px solid #ddd; padding:2px 8px; border-radius:10px;">GUEST</small></h1>
        <p style="margin:0; font-size:0.8rem; opacity:0.6;">— C H E C K Q</p>
      </div>
      <div style="text-align:right;">
        <div style="font-size:0.8rem; opacity:0.5;">Profile</div>
        <div style="font-size:1.5rem;">👤</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-box">
        <div style="font-size:0.6rem; opacity:0.5;">NEXT QUEUE</div>
        <div style="font-size:1.5rem; font-weight:bold;">21</div>
        <div style="font-size:0.6rem; opacity:0.5;">APR 2026</div>
      </div>
      <div class="stat-box">
        <div style="font-size:0.6rem; opacity:0.5;">จำนวนคิวก่อนหน้า</div>
        <div style="border: 2px solid var(--accent); width:35px; height:35px; border-radius:50%; margin:5px auto; display:flex; align-items:center; justify-content:center; font-weight:bold;">3</div>
        <div style="font-size:0.6rem; opacity:0.5;">คิว</div>
      </div>
      <div class="stat-box">
        <div style="font-size:0.6rem; opacity:0.5;">ความสำเร็จวันนี้</div>
        <div style="font-size:1.2rem; margin:8px 0;">🎯</div>
        <div style="font-size:0.7rem; font-weight:bold;"><span id="progText">0%</span> • <span id="jobCount">0/0</span> งาน</div>
      </div>
    </div>

    <div class="hero-card">
      <div style="font-size:3rem;" id="petEmoji">🐱</div>
      <div onclick="nextPet()" style="cursor:pointer; font-size:1.2rem; font-weight:bold;">Name </div>
      <p style="font-size:0.8rem; color:#4CAF50; margin-top:5px;">😊 Healthy | กินครบ 2 วันติด 👍</p>
    </div>

    <p style="font-weight:bold; margin:20px 0 10px; opacity:0.6; font-size:0.9rem;">TODAY'S TASK ——————</p>
    <div id="taskList">
      </div>
    <div id="emptyState" class="empty-state">SKY IS CLEAR ✨</div>
  </div>

  <div id="calendar" class="app-page">
    <h2 style="text-align:center;">📅 ปฏิทินกิจกรรม</h2>
    <div class="cal-card">
      <div style="display:flex; justify-content:space-between; align-items:center; font-weight:bold;">
        <span>◀</span> <span>April 2026</span> <span>▶</span>
      </div>
      <div class="cal-grid" id="calDays">
        </div>
    </div>

    <div class="glass-card" style="margin-top:20px;">
       <p style="margin-top:0;"><b>🎨 เปลี่ยนธีมสี</b></p>
       <div style="display:flex; gap:15px; justify-content:center;">
         <div onclick="setTheme('')" style="width:35px; height:35px; background:#FEF7C5; border-radius:50%; cursor:pointer; border:2px solid white;"></div>
         <div onclick="setTheme('berry')" style="width:35px; height:35px; background:#FFB4DA; border-radius:50%; cursor:pointer; border:2px solid white;"></div>
         <div onclick="setTheme('sprout')" style="width:35px; height:35px; background:#D5FFC9; border-radius:50%; cursor:pointer; border:2px solid white;"></div>
         <div onclick="setTheme('ocean')" style="width:35px; height:35px; background:#BCD3F9; border-radius:50%; cursor:pointer; border:2px solid white;"></div>
       </div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home', this)">🏠</div>
  <div class="nav-item" onclick="switchPage('calendar', this)">📅</div>
  <div class="nav-item" onclick="switchPage('settings', this)">⚙️</div>
</nav>

<script>
  let petData = [
    { name: "น้องชานม", emoji: "🐱", tasks: [{title: "อาหารเช้า (11:00)", done: false}, {title: "ล้างกระบะทราย", done: false}] },
    { name: "น้องม็อคค่า", emoji: "🐶", tasks: [{title: "พาวิ่งเล่น", done: false}] }
  ];
  let currentIdx = 0;

  function renderHome() {
    const pet = petData[currentIdx];
    document.getElementById('petName').innerText = pet.name + " ∨";
    document.getElementById('petEmoji').innerText = pet.emoji;
    
    const list = document.getElementById('taskList');
    list.innerHTML = "";
    let done = 0;

    pet.tasks.forEach((t, i) => {
      if(t.done) done++;
      list.innerHTML += `
        <div class="task-item" style="${t.done?'opacity:0.5':''}">
          <span>${t.done?'✔️':'🥣'} ${t.title}</span>
          <button class="btn-check" onclick="toggleTask(${i})">${t.done?'DONE':'CHECK'}</button>
        </div>`;
    });

    document.getElementById('emptyState').style.display = pet.tasks.length ? 'none' : 'block';
    const percent = pet.tasks.length ? Math.round((done/pet.tasks.length)*100) : 0;
    document.getElementById('progText').innerText = percent + "%";
    document.getElementById('jobCount').innerText = `${done}/${pet.tasks.length}`;
  }

  function toggleTask(i) { petData[currentIdx].tasks[i].done = !petData[currentIdx].tasks[i].done; renderHome(); }
  function nextPet() { currentIdx = (currentIdx + 1) % petData.length; renderHome(); }
  function switchPage(id, el) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
  function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }

  // เจนปฏิทินแบบง่าย
  const cal = document.getElementById('calDays');
  for(let i=1; i<=30; i++) {
    cal.innerHTML += `<div class="day ${i==21?'active':''}">${i}</div>`;
  }

  renderHome();
</script>

</body>
</html>
