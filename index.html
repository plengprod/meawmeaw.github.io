<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw Ultimate Sync 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. THEME ENGINE --- */
    :root { --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --progress: #BCD3F9; --text: #5D5632; }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --progress: #F5D1EF; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --progress: #FFCBBF; --text: #3D5238; }
    [data-theme="cream"] { --bg: #FFF8E9; --hero: #FFFFFF; --accent: #F9D99A; --progress: #F5D1EF; --text: #6B5D44; }
    [data-theme="lavender"] { --bg: #F5D1EF; --hero: #FDF5FF; --accent: #D6A4D1; --progress: #D5FFC9; --text: #564053; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --progress: #FEF7C5; --text: #3A4B6B; }
    [data-theme="peach"] { --bg: #FFF4FD; --hero: #FFFFFF; --accent: #FFB4DA; --progress: #D5FFC9; --text: #6B4E5E; }
    [data-theme="melon"] { --bg: #FFCBBF; --hero: #FFF5F2; --accent: #FF9B85; --progress: #FEF7C5; --text: #633E36; }

    body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 120px; transition: 0.5s; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 380px; }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: relative; width: 100%; }
    .theme-dropdown { position: absolute; top: 60px; right: 0; background: white; border-radius: 20px; padding: 12px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; }
    .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #eee; }

    /* Progress Card */
    .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); padding: 20px; border-radius: 30px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3); }

    /* Pet Hero */
    .hero-card { background-color: var(--hero); padding: 25px; border-radius: 35px; text-align: center; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
    .pet-name-input { background: none; border: none; font-family: 'Kanit'; font-size: 1.2rem; font-weight: 500; text-align: center; color: var(--text); width: 150px; outline: none; }

    /* Task Box */
    .task-box { background: white; padding: 15px 20px; border-radius: 25px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .task-box.done { opacity: 0.5; text-decoration: line-through; }
    .btn-check { background: var(--accent); color: white; border: none; padding: 6px 15px; border-radius: 12px; cursor: pointer; font-family: 'Kanit'; font-weight: 500; }

    /* Bottom Nav (Full Width) */
    .bottom-nav { position: fixed; bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); width: 90%; max-width: 380px; height: 70px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); left: 50%; transform: translateX(-50%); z-index: 1000; }
    .nav-item { flex: 1; text-align: center; font-size: 26px; cursor: pointer; opacity: 0.3; }
    .nav-item.active { opacity: 1; }

    /* Modal (Calendar/Alert) */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
    .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 30px 30px 0 0; padding: 25px; box-sizing: border-box; }
    .input-row { background: #f5f5f5; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; }
    .input-row input { border: none; background: none; font-family: 'Kanit'; outline: none; width: 100%; }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <div>
      <h2 style="margin:0">สวัสดีเจ้าทาส! 🐾</h2>
      <p id="displayDate" style="margin:0; font-size: 0.85rem; opacity: 0.7;"></p>
    </div>
    <div onclick="toggleMenu()" style="cursor:pointer; background:white; padding:8px; border-radius:12px;">🎨</div>
    <div class="theme-dropdown" id="themeMenu">
      <div class="theme-dot" style="background:#FEF7C5" onclick="setTheme('')"></div>
      <div class="theme-dot" style="background:#FFB4DA" onclick="setTheme('berry')"></div>
      <div class="theme-dot" style="background:#D5FFC9" onclick="setTheme('sprout')"></div>
      <div class="theme-dot" style="background:#FFF8E9" onclick="setTheme('cream')"></div>
      <div class="theme-dot" style="background:#F5D1EF" onclick="setTheme('lavender')"></div>
      <div class="theme-dot" style="background:#BCD3F9" onclick="setTheme('ocean')"></div>
      <div class="theme-dot" style="background:#FFF4FD" onclick="setTheme('peach')"></div>
      <div class="theme-dot" style="background:#FFCBBF" onclick="setTheme('melon')"></div>
    </div>
  </div>

  <div class="glass-card">
    <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
      <span>🎯 ความสำเร็จวันนี้ ></span>
      <span id="progText">0% (0 / 1 งาน)</span>
    </div>
    <div style="background:rgba(0,0,0,0.05); height:10px; border-radius:10px; margin-top:10px; overflow:hidden;">
      <div id="progBar" style="background:var(--progress); width:0%; height:100%; transition:0.5s;"></div>
    </div>
  </div>

  <div class="hero-card">
    <div style="font-size: 3.5rem; cursor: pointer;" onclick="switchPet()">🐱</div>
    <input type="text" class="pet-name-input" id="petName" value="น้องชานม">
    <p style="font-size: 0.85rem; color: #4CAF50; margin-top: 5px;">😊 Healthy</p>
  </div>

  <p style="font-weight:500; margin-bottom:10px;">ตารางวันนี้</p>
  <div id="taskList">
    <div class="task-box">
      <span>🥣 อาหารเช้า (11:00)</span>
      <button class="btn-check" onclick="checkTask(this)">CHECK</button>
    </div>
  </div>
</div>

<div class="modal" id="calModal">
  <div class="modal-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <span onclick="closeCal()" style="font-size:1.5rem; cursor:pointer;">✕</span>
      <b style="font-size:1.1rem;">สร้างการแจ้งเตือน</b>
      <span onclick="saveTask()" style="color:var(--accent); font-size:1.5rem; cursor:pointer;">✔</span>
    </div>
    
    <div class="input-row"><input type="text" id="taskTitle" placeholder="ชื่อกิจกรรม"></div>
    
    <div style="background:#f9f9f9; padding:20px; border-radius:20px; margin-bottom:20px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
        <span>📅 วันที่</span> 
        <input type="date" id="taskDate" style="font-family:'Kanit'; border:1px solid #ddd; border-radius:8px; padding:5px;">
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>⏰ เวลา</span> 
        <input type="time" id="taskTime" style="font-family:'Kanit'; border:1px solid #ddd; border-radius:8px; padding:5px;">
      </div>
    </div>

    <button onclick="saveTask()" style="background:var(--accent); color:white; border:none; width:100%; padding:15px; border-radius:15px; font-weight:500;">ตกลง</button>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="location.reload()">🏠</div>
  <div class="nav-item" onclick="openCal()">📅</div>
  <div class="nav-item">⚙️</div>
</nav>

<script>
  let total = 1, done = 0;
  
  // แสดงวันที่ปัจจุบันในหน้า Home
  const now = new Date();
  document.getElementById('displayDate').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  // Set default date ใน Modal เป็นวันนี้
  document.getElementById('taskDate').valueAsDate = now;

  function toggleMenu() {
    const m = document.getElementById('themeMenu');
    m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
  }
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeMenu').style.display = 'none';
  }
  function openCal() { document.getElementById('calModal').style.display = 'flex'; }
  function closeCal() { document.getElementById('calModal').style.display = 'none'; }

  function saveTask() {
    const title = document.getElementById('taskTitle').value;
    const dateInput = document.getElementById('taskDate').value;
    const time = document.getElementById('taskTime').value;
    
    if(!title) return alert("ใส่ชื่อกิจกรรมด้วยมึง!");

    // แปลงรูปแบบวันที่ให้ดูง่ายขึ้น
    const d = new Date(dateInput);
    const dateStr = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

    const html = `
      <div class="task-box">
        <div>
          <div style="font-weight:500;">${title}</div>
          <div style="font-size:0.75rem; color:#999;">📅 ${dateStr} | ⏰ ${time || 'ไม่ระบุ'}</div>
        </div>
        <button class="btn-check" onclick="checkTask(this)">CHECK</button>
      </div>
    `;
    document.getElementById('taskList').insertAdjacentHTML('afterbegin', html);
    total++; updateProg(); closeCal();
  }

  function checkTask(btn) {
    const box = btn.closest('.task-box');
    if(box.classList.contains('done')) return;
    box.classList.add('done'); btn.innerText = "DONE ✔️"; btn.style.background = "#ccc";
    done++; updateProg();
  }

  function updateProg() {
    const p = Math.round((done / total) * 100);
    document.getElementById('progBar').style.width = p + '%';
    document.getElementById('progText').innerText = `${p}% (${done} / ${total} งาน)`;
  }
</script>

</body>
</html>
