<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw App 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. THEME ENGINE --- */
    :root { --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --progress: #BCD3F9; --text: #5D5632; }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --progress: #F5D1EF; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --progress: #FFCBBF; --text: #3D5238; }
    [data-theme="cream"] { --bg: #FFF8E9; --hero: #FFFFFF; --accent: #F9D99A; --progress: #F5D1EF; --text: #6B5D44; }
    [data-theme="lavender"] { --bg: #F5D1EF; --hero: #FDF5FF; --accent: #D6A4D1; --progress: #D5FFC9; --text: #564053; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --progress: #FEF7C5; --text: #3A4B6B; }
    [data-theme="peach"] { --bg: #FFF4FD; --hero: #FFFFFF; --accent: #FFB4DA; --progress: #D5FFC9; --text: #6B4E5E; }
    [data-theme="melon"] { --bg: #FFCBBF; --hero: #FFF5F2; --accent: #FF9B85; --progress: #FEF7C5; --text: #633E36; }

    body { font-family: 'Itim', cursive; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 120px; transition: 0.5s; }
    .container { width: 100%; max-width: 380px; margin: auto; }

    /* Page System */
    .app-page { display: none; width: 100%; animation: fadeIn 0.3s ease; }
    .app-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- CALENDAR STYLE --- */
    .cal-card { background: white; border-radius: 35px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
    .day-name { font-size: 0.7rem; opacity: 0.4; margin-bottom: 10px; }
    .day { padding: 10px 0; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
    .day:hover { background: var(--bg); }
    .day.active { background: var(--accent); color: white; font-weight: bold; }
    .day.today { border: 2px solid var(--accent); }

    /* Input Style */
    .input-group { background: rgba(255,255,255,0.5); padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); }
    input, select { 
      width: 100%; border: none; background: white; padding: 12px 15px; border-radius: 15px; 
      font-family: 'Itim'; margin-bottom: 10px; box-sizing: border-box; color: var(--text);
    }
    .btn-save { 
      width: 100%; padding: 15px; background: var(--accent); color: white; border: none; 
      border-radius: 20px; font-family: 'Itim'; font-size: 1rem; cursor: pointer; transition: 0.3s;
    }
    .btn-save:active { transform: scale(0.95); }

    /* Navigation */
    .bottom-nav { position: fixed; bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); width: 90%; max-width: 380px; height: 75px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 1000; }
    .nav-item { flex: 1; text-align: center; cursor: pointer; opacity: 0.3; transition: 0.3s; font-size: 1.5rem; }
    .nav-item.active { opacity: 1; transform: scale(1.1); }
  </style>
</head>

<body>

<div class="container">

  <div id="home" class="app-page active">
    <h2>สวัสดีเจ้าทาส! 🐾</h2>
    <div style="background:white; padding:20px; border-radius:30px; text-align:center; margin-bottom:20px;">
       <p>จิ้มเพื่อเปลี่ยนธีม (สีจะเปลี่ยนทั้งแอป)</p>
       <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
         <div onclick="setTheme('')" style="height:30px; background:#FEF7C5; border-radius:50%; cursor:pointer;"></div>
         <div onclick="setTheme('berry')" style="height:30px; background:#FFB4DA; border-radius:50%; cursor:pointer;"></div>
         <div onclick="setTheme('sprout')" style="height:30px; background:#D5FFC9; border-radius:50%; cursor:pointer;"></div>
         <div onclick="setTheme('ocean')" style="height:30px; background:#BCD3F9; border-radius:50%; cursor:pointer;"></div>
       </div>
    </div>
    <div class="cal-card" style="text-align:center;">
       <p>หน้า Home ของมึง (โค้ดเก่ามึงใส่ตรงนี้ได้เลย)</p>
    </div>
  </div>

  <div id="calendar" class="app-page">
    <h2 style="text-align:center;">📅 ปฏิทิน</h2>
    
    <div class="cal-card">
      <div class="cal-header">
        <span onclick="alert('ย้อนกลับ')">◀</span>
        <span>April 2026</span>
        <span onclick="alert('ถัดไป')">▶</span>
      </div>
      
      <div class="cal-grid">
        <div class="day-name">SUN</div><div class="day-name">MON</div><div class="day-name">TUE</div><div class="day-name">WED</div>
        <div class="day-name">THU</div><div class="day-name">FRI</div><div class="day-name">SAT</div>
        
        <div class="day" style="opacity:0.2">29</div><div class="day" style="opacity:0.2">30</div><div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day">5</div>
        <div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div><div class="day">10</div><div class="day">11</div><div class="day">12</div>
        <div class="day">13</div><div class="day">14</div><div class="day">15</div><div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div>
        <div class="day">20</div><div class="day active today">21</div><div class="day">22</div><div class="day">23</div><div class="day">24</div><div class="day">25</div><div class="day">26</div>
        <div class="day">27</div><div class="day">28</div><div class="day">29</div><div class="day">30</div><div class="day" style="opacity:0.2">1</div><div class="day" style="opacity:0.2">2</div><div class="day" style="opacity:0.2">3</div>
      </div>
    </div>

    <div class="input-group">
      <p style="margin-top:0; font-weight:bold;">🕒 ตั้งค่ากิจกรรมวันที่ 21</p>
      <input type="text" placeholder="ชื่อกิจกรรม (เช่น ให้อาหารชานม)">
      <div style="display:flex; gap:10px;">
        <input type="time" value="11:00" style="flex:1;">
        <select style="flex:1;">
          <option>เตือนล่วงหน้า 5 นาที</option>
          <option>เตือนเมื่อถึงเวลา</option>
        </select>
      </div>
      <button class="btn-save" onclick="alert('บันทึกแล้วมึง!')">บันทึกกิจกรรม</button>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home', this)">🏠</div>
  <div class="nav-item" onclick="switchPage('calendar', this)">📅</div>
  <div class="nav-item">⚙️</div>
</nav>

<script>
  function switchPage(pageId, el) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }

  function setTheme(themeName) {
    document.documentElement.setAttribute('data-theme', themeName);
  }

  // ตัวอย่างกดเลือกวันที่ (Logic จริงต้องใช้ JS Date)
  document.querySelectorAll('.day').forEach(day => {
    day.addEventListener('click', function() {
      if(this.innerText && this.style.opacity != "0.2") {
        document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
        this.classList.add('active');
      }
    });
  });
</script>

</body>
</html>
