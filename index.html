<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw App 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --progress: #BCD3F9; --text: #5D5632; }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --progress: #F5D1EF; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --progress: #FFCBBF; --text: #3D5238; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --progress: #FEF7C5; --text: #3A4B6B; }

    body { font-family: 'Itim', cursive; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.5s; }
    .container { width: 100%; max-width: 380px; margin: auto; padding-bottom: 100px; }

    /* Page System */
    .app-page { display: none; animation: fadeIn 0.3s ease; }
    .app-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* UI Components */
    .glass-card { background: rgba(255, 255, 255, 0.6); border-radius: 30px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3); }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; margin-bottom: 15px; }
    .stat-box { background: white; border-radius: 25px; padding: 15px 5px; text-align: center; cursor: pointer; }

    /* Input Style ตามสั่ง */
    .input-center { text-align: center; width: 100%; border: none; background: white; padding: 15px; border-radius: 20px; font-family: 'Itim'; font-size: 1.1rem; margin-bottom: 15px; box-sizing: border-box; color: var(--text); }
    .time-mini { width: 100px; text-align: center; border: none; background: white; padding: 10px; border-radius: 15px; font-family: 'Itim'; font-size: 1.2rem; display: block; margin: 0 auto 15px; }

    /* Task Items */
    .task-row { background: white; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .btn-star { background: none; border: none; font-size: 1.2rem; cursor: pointer; opacity: 0.3; }
    .btn-star.active { opacity: 1; filter: grayscale(0); }

    /* Nav */
    .bottom-nav { position: fixed; bottom: 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); width: 90%; max-width: 380px; height: 70px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .nav-item { cursor: pointer; opacity: 0.3; font-size: 1.5rem; }
    .nav-item.active { opacity: 1; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="home" class="app-page active">
    <h1>ไงเจ้าทาส ! 🐾</h1>
    <div class="stat-grid">
      <div class="stat-box"><div>NEXT QUEUE</div><div style="font-size:1.2rem; font-weight:bold;">21</div><div>APR 2026</div></div>
      <div class="stat-box" onclick="switchPage('task-list', document.getElementById('nav-task'))">
        <div>ตารางที่เหลือ</div>
        <div id="remCount" style="border:2px solid var(--accent); width:30px; height:30px; border-radius:50%; margin:5px auto; line-height:30px; font-weight:bold;">0</div>
        <div>CHECK</div>
      </div>
      <div class="stat-box"><div>ความสำเร็จ</div><div style="font-size:1.2rem;">❤️</div><div id="progText">0%</div></div>
    </div>

    <div id="homeTasks">
      <div style="text-align:center; opacity:0.3; padding:40px;">เลือกงานจากหน้าเช็คมาโชว์ที่นี่ ⭐️</div>
    </div>
  </div>

  <div id="task-list" class="app-page">
    <h2 style="text-align:center;">📋 งานทั้งหมดที่ตั้งไว้</h2>
    <div id="allTasksContainer">
      <div style="text-align:center; opacity:0.3; padding:50px;">หน้าโล่งๆ... <br>ไปตั้งค่าที่ปฏิทินก่อนมึง!</div>
    </div>
  </div>

  <div id="calendar" class="app-page">
    <h2 style="text-align:center;">📅 จัดตารางให้เจ้านาย</h2>
    <div class="glass-card" style="text-align:center;">
       <input type="text" id="tTitle" class="input-center" placeholder="พิมพ์ชื่อกิจกรรมน่ารักๆ ตรงนี้...">
       
       <input type="time" id="tTime" class="time-mini" value="00:00">

       <select id="tType" style="width:100%; padding:12px; border-radius:15px; border:none; margin-bottom:15px; font-family:'Itim';">
         <option value="grid">แสดงแบบคู่</option>
         <option value="full">แสดงแบบแถวยาว</option>
       </select>

       <button onclick="saveTask()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:20px; font-family:'Itim'; font-weight:bold; cursor:pointer;">บันทึกลงตาราง</button>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('home', this)">🏠</div>
  <div id="nav-task" class="nav-item" onclick="switchPage('task-list', this)">📋</div>
  <div class="nav-item" onclick="switchPage('calendar', this)">📅</div>
</nav>

<script>
  let tasks = [];

  function saveTask() {
    const title = document.getElementById('tTitle').value;
    const time = document.getElementById('tTime').value;
    const type = document.getElementById('tType').value;
    if(!title) return alert("ใส่ชื่อด้วยมึง!");

    tasks.push({ title, time, type, done: false, showOnHome: false });
    alert("เด้งเข้าไปในหน้าเช็คแล้ว!");
    render();
    switchPage('task-list', document.getElementById('nav-task'));
    document.getElementById('tTitle').value = "";
  }

  function render() {
    const listCont = document.getElementById('allTasksContainer');
    const homeCont = document.getElementById('homeTasks');
    listCont.innerHTML = ""; homeCont.innerHTML = "";
    
    let rem = 0;
    tasks.forEach((t, i) => {
      if(!t.done) rem++;
      
      // หน้าลิสต์รวม (พอกดจากปุ่มเช็ค)
      listCont.innerHTML += `
        <div class="task-row">
          <div><b>${t.time}</b> ${t.title}</div>
          <button class="btn-star ${t.showOnHome?'active':''}" onclick="toggleHome(${i})">⭐️</button>
        </div>`;

      // หน้าโฮม (เฉพาะที่เลือก)
      if(t.showOnHome) {
        homeCont.innerHTML += `
          <div class="task-row">
            <span>${t.done?'✔️':'🥣'} ${t.title} (${t.time})</span>
            <button onclick="toggleDone(${i})" style="background:var(--accent); border:none; border-radius:10px; color:white; padding:5px 10px;">${t.done?'DONE':'CHECK'}</button>
          </div>`;
      }
    });

    document.getElementById('remCount').innerText = rem;
    if(tasks.length === 0) listCont.innerHTML = `<div style="text-align:center; opacity:0.3; padding:50px;">หน้าโล่งๆ... <br>ไปตั้งค่าที่ปฏิทินก่อนมึง!</div>`;
    if(homeCont.innerHTML === "") homeCont.innerHTML = `<div style="text-align:center; opacity:0.3; padding:40px;">เลือกงานจากหน้าเช็คมาโชว์ที่นี่ ⭐️</div>`;
  }

  function toggleHome(i) { tasks[i].showOnHome = !tasks[i].showOnHome; render(); }
  function toggleDone(i) { tasks[i].done = !tasks[i].done; render(); }

  function switchPage(id, el) {
    document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
</script>

</body>
</html>
