<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeawMeaw 🐾 Smart App</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. CSS VARIABLES (8 PALETTES) --- */
    :root {
      --bg: #FEF7C5; --hero: #FFFCE6; --accent: #F3D617; --progress: #BCD3F9; --text: #5D5632;
    }
    [data-theme="berry"] { --bg: #FFB4DA; --hero: #FFF0F7; --accent: #FF8FAB; --progress: #F5D1EF; --text: #633B4D; }
    [data-theme="sprout"] { --bg: #D5FFC9; --hero: #F2FFE0; --accent: #86D071; --progress: #FFCBBF; --text: #3D5238; }
    [data-theme="cream"] { --bg: #FFF8E9; --hero: #FFFFFF; --accent: #F9D99A; --progress: #F5D1EF; --text: #6B5D44; }
    [data-theme="lavender"] { --bg: #F5D1EF; --hero: #FDF5FF; --accent: #D6A4D1; --progress: #D5FFC9; --text: #564053; }
    [data-theme="ocean"] { --bg: #BCD3F9; --hero: #F0F5FF; --accent: #8EB1E6; --progress: #FEF7C5; --text: #3A4B6B; }
    [data-theme="peach"] { --bg: #FFF4FD; --hero: #FFFFFF; --accent: #FFB4DA; --progress: #D5FFC9; --text: #6B4E5E; }
    [data-theme="melon"] { --bg: #FFCBBF; --hero: #FFF5F2; --accent: #FF9B85; --progress: #FEF7C5; --text: #633E36; }

    /* --- 2. BASE STYLES --- */
    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg); color: var(--text);
      margin: 0; padding: 20px; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      transition: all 0.4s ease;
    }

    /* --- 3. HEADER & DROPDOWN --- */
    .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: relative; }
    
    .theme-dropdown {
      position: absolute; top: 45px; right: 0; background: white; border-radius: 15px;
      padding: 10px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100;
    }
    .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #eee; }

    /* --- 4. CARDS (จากรูปมึง) --- */
    .glass-card {
      background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(12px);
      width: 90%; max-width: 380px; padding: 20px; border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 15px;
    }
    .hero-card {
      background-color: var(--hero); width: 90%; max-width: 380px; padding: 25px; border-radius: 35px;
      text-align: center; margin-bottom: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    }

    /* --- 5. TASK AREA (เส้นประ) --- */
    .task-area {
      width: 90%; max-width: 380px; border: 2px dashed rgba(0,0,0,0.1); border-radius: 25px;
      padding: 40px 20px; text-align: center; opacity: 0.6;
    }

    /* --- 6. NAVIGATION --- */
    .bottom-nav {
      position: fixed; bottom: 20px; background: rgba(255,255,255,0.8);
      backdrop-filter: blur(15px); width: 260px; height: 65px; border-radius: 40px;
      display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
    .nav-item.active { opacity: 1; }

    .fab {
      position: fixed; bottom: 100px; right: 30px; background-color: var(--accent);
      width: 60px; height: 60px; border-radius: 50%; display: flex;
      justify-content: center; align-items: center; font-size: 30px; color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15); cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <h2 style="margin:0">สวัสดีเจ้าทาส! 🐾</h2>
      <p style="margin:0; font-size: 0.8rem; opacity: 0.6;">จันทร์ที่ 20 เม.ย. 2026</p>
    </div>
    <div onclick="toggleThemeMenu()" style="cursor:pointer; font-size: 24px; background: white; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">🎨</div>
    
    <div class="theme-dropdown" id="themeMenu">
      <div class="theme-dot" style="background: #FEF7C5;" onclick="setTheme('')"></div>
      <div class="theme-dot" style="background: #FFB4DA;" onclick="setTheme('berry')"></div>
      <div class="theme-dot" style="background: #D5FFC9;" onclick="setTheme('sprout')"></div>
      <div class="theme-dot" style="background: #FFF8E9;" onclick="setTheme('cream')"></div>
      <div class="theme-dot" style="background: #F5D1EF;" onclick="setTheme('lavender')"></div>
      <div class="theme-dot" style="background: #BCD3F9;" onclick="setTheme('ocean')"></div>
      <div class="theme-dot" style="background: #FFF4FD;" onclick="setTheme('peach')"></div>
      <div class="theme-dot" style="background: #FFCBBF;" onclick="setTheme('melon')"></div>
    </div>
  </div>

  <div class="glass-card">
    <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
      <span>🎯 ความสำเร็จวันนี้</span>
      <span>33%</span>
    </div>
    <div style="background: rgba(0,0,0,0.05); height: 10px; border-radius: 10px; margin-top: 10px; overflow: hidden;">
      <div style="background: var(--progress); width: 33%; height: 100%; transition: 0.5s;"></div>
    </div>
  </div>

  <div class="hero-card">
    <div style="font-size: 3rem; margin-bottom: 5px;">🐱</div>
    <div style="font-weight: 500; font-size: 1.3rem;">น้องชานม ∨</div>
    <p style="font-size: 0.9rem; opacity: 0.7;">สุขภาพ: ปกติ | การกิน: ปกติ 🍽️</p>
  </div>

  <div class="task-area">
    <span style="letter-spacing: 2px;">SKY IS CLEAR ✨</span>
  </div>

  <div class="fab" onclick="alert('เพิ่มกิจกรรมใหม่')">＋</div>

  <nav class="bottom-nav">
    <div class="nav-item active">🏠</div>
    <div class="nav-item" onclick="alert('ไปหน้า Health')">🩺</div>
    <div class="nav-item" onclick="alert('ไปหน้า Settings')">⚙️</div>
  </nav>

  <script>
    function toggleThemeMenu() {
      const menu = document.getElementById('themeMenu');
      menu.style.display = (menu.style.display === 'grid') ? 'none' : 'grid';
    }

    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeMenu').style.display = 'none'; // เลือกเสร็จแล้วซ่อนเมนู
    }

    // คลิกข้างนอกเมนูให้เมนูปิด
    window.onclick = function(event) {
      if (!event.target.matches('.header div')) {
        const menu = document.getElementById('themeMenu');
        if (menu.style.display === 'grid') {
          // menu.style.display = 'none';
        }
      }
    }
  </script>

</body>
</html>
